<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BOS Stall Sign</title>
  <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{margin:0;padding:0;background:#ffffff;font-family:'Kaushan Script',cursive}
    .sign{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8% 10%}
    .line{font-size:8vw;color:#1a1a1a;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;line-height:1.0}
    .line:last-child{margin-top:-0.15em}
    .empty{color:#cccccc}
    .dot{position:fixed;bottom:4px;right:6px;width:5px;height:5px;border-radius:50%;background:#ccc;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
  </style>
</head>
<body>
<div class="sign">
  <div class="line" id="line1"><span class="empty">—</span></div>
  <div class="line" id="line2"><span class="empty">—</span></div>
</div>
<div class="dot"></div>
<script>
  var APPS_URL = 'https://script.google.com/macros/s/AKfycbw5aw5UwZG6UtNJTzG6bS5ixmqiEaOeED-E5PivA1esBjn-VTmCe-wSMuVAzKMASKAl4Q/exec';
  var stallId = 'STALL-05';
  var slot = '2';
  var seq = 0;
  function fetchSign() {
    var cb = 'bss' + (++seq);
    var done = false;
    var script = document.createElement('script');
    var timer = setTimeout(function(){ cleanup(); }, 7000);
    window[cb] = function(data) {
      setLine('line1', data.line1);
      setLine('line2', data.line2);
      cleanup();
    };
    script.onerror = function(){ cleanup(); };
    script.src = APPS_URL + '?action=getStallSign&stallId=' + encodeURIComponent(stallId)
               + '&slot=' + encodeURIComponent(slot)
               + '&callback=' + cb + '&_t=' + Date.now();
    document.body.appendChild(script);
    function cleanup() {
      if (done) return; done = true;
      clearTimeout(timer);
      try { delete window[cb]; } catch(e){ window[cb] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
    }
  }
  function setLine(id, text) {
    var el = document.getElementById(id);
    if (text && text.trim()) { el.textContent = text.trim(); }
    else { el.innerHTML = '<span class="empty">—</span>'; }
  }
  fetchSign();
  setInterval(fetchSign, 30000);
</script>
</body>
</html>
