<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BOS Stall Sign</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100vw;height:100vh;background:#ffffff;font-family:'Cormorant Garamond',serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .sign{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8% 10%;gap:8%}
    .line{font-size:8vw;font-weight:600;color:#1a1a1a;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;line-height:1.2;letter-spacing:.06em}
    .empty{color:#cccccc;font-weight:400}
  </style>
</head>
<body>
<div class="sign">
  <div class="line" id="line1"><span class="empty">—</span></div>
  <div class="line" id="line2"><span class="empty">—</span></div>
</div>
<script>
  var APPS_URL = 'https://script.google.com/macros/s/AKfycbw5aw5UwZG6UtNJTzG6bS5ixmqiEaOeED-E5PivA1esBjn-VTmCe-wSMuVAzKMASKAl4Q/exec';
  var FETCH_MS = 30000;
  var seq = 0;

  function getParam(name) {
    var match = new RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
    return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : '';
  }

  var stallId = getParam('stall') || 'STALL-01';
  var slot    = getParam('slot')  || '1';

  function fetchSign() {
    var cb = 'bosStallSign' + (++seq);
    var done = false;
    var script = document.createElement('script');
    var timer = setTimeout(function(){ cleanup(); }, 7000);

    window[cb] = function(data) {
      setLine('line1', data.line1);
      setLine('line2', data.line2);
      cleanup();
    };
    script.onerror = function(){ cleanup(); };
    script.src = APPS_URL + '?action=getStallSign&stallId=' + encodeURIComponent(stallId)
               + '&slot=' + encodeURIComponent(slot)
               + '&callback=' + cb + '&_t=' + Date.now();
    document.body.appendChild(script);

    function cleanup() {
      if (done) return;
      done = true;
      clearTimeout(timer);
      try { delete window[cb]; } catch(e){ window[cb] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
    }
  }

  function setLine(id, text) {
    var el = document.getElementById(id);
    if (text && text.trim()) {
      el.textContent = text.trim();
      el.classList.remove('empty');
    } else {
      el.innerHTML = '<span class="empty">—</span>';
    }
  }

  fetchSign();
  setInterval(fetchSign, FETCH_MS);
</script>
</body>
</html>
