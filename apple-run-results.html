<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Broad Oak Stables - Apple Run Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--page:#25232b;--card:#ffffff;--ink:#222;--muted:#777;--line:#e4e4e4;--accent:#d8b874;--dark:#1f1f1f;--font:'Lato',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--page);color:var(--ink);font-family:var(--font);font-size:16px;font-weight:300;line-height:1.65;min-height:100vh}
    .hero{position:relative;min-height:540px;display:flex;align-items:center;justify-content:center;overflow:hidden;background-color:#6e6d68;background-image:linear-gradient(90deg,rgba(0,0,0,.36) 0 2px,transparent 2px 10.8%,rgba(255,255,255,.05) 10.8% 11%,transparent 11% 21.8%,rgba(0,0,0,.32) 21.8% 22%,transparent 22% 32.7%,rgba(255,255,255,.05) 32.7% 33%,transparent 33% 43.8%,rgba(0,0,0,.34) 43.8% 44%,transparent 44% 54.8%,rgba(255,255,255,.045) 54.8% 55%,transparent 55% 65.8%,rgba(0,0,0,.32) 65.8% 66%,transparent 66% 76.8%,rgba(255,255,255,.045) 76.8% 77%,transparent 77% 87.8%,rgba(0,0,0,.34) 87.8% 88%,transparent 88% 100%),repeating-linear-gradient(180deg,rgba(255,255,255,.06) 0 1px,transparent 1px 42px,rgba(0,0,0,.08) 42px 84px),radial-gradient(circle at 20% 28%,rgba(255,255,255,.09),transparent 15%),radial-gradient(circle at 70% 52%,rgba(0,0,0,.16),transparent 18%),linear-gradient(180deg,#77756f 0%,#62615d 58%,#555450 100%);background-size:100% 100%}
    .hero::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.22)}
    header{position:absolute;top:0;left:0;right:0;height:96px;padding:0 48px;display:flex;align-items:center;justify-content:space-between;z-index:2;color:#fff;background:linear-gradient(180deg,rgba(0,0,0,.28),rgba(0,0,0,0))}
    .brand{display:flex;align-items:center;gap:18px;color:#fff;text-decoration:none;font-size:30px;font-weight:300;text-shadow:0 2px 14px rgba(0,0,0,.45)}
    .brand-icon{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.86);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.35)}.brand-icon img{width:100%;height:100%;object-fit:cover}
    nav{display:flex;align-items:center;gap:34px}nav a{color:#fff;text-decoration:none;font-size:22px;font-weight:300;text-shadow:0 2px 14px rgba(0,0,0,.55);opacity:.96}nav a:hover{opacity:1;text-decoration:underline;text-underline-offset:5px}.search{font-size:35px;line-height:1;transform:rotate(-20deg);display:inline-block;color:#fff;opacity:.95}
    .hero-title{position:relative;z-index:1;text-align:center;color:#fff;padding:120px 24px 80px;text-shadow:0 2px 18px rgba(0,0,0,.32)}.hero-title h1{font-size:clamp(72px,9vw,132px);font-weight:300;letter-spacing:.02em;line-height:1}.hero-title p{margin-top:24px;font-size:24px;font-weight:300;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.88)}
    .content-band{background:var(--page);padding:54px 0 80px}.panel{width:min(86vw,1540px);margin:0 auto;background:var(--card);border:1px solid #d8d8d8;box-shadow:0 1px 0 rgba(0,0,0,.08);min-height:520px}.controls{display:flex;align-items:center;justify-content:space-between;padding:34px 42px;border-bottom:1px solid var(--line);gap:24px;flex-wrap:wrap}.tabs{display:flex}.tab{border:0;border-right:1px solid rgba(0,0,0,.15);background:#6fa0e8;color:#fff;font-family:var(--font);font-size:15px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:13px 34px;cursor:pointer}.tab:first-child{border-radius:5px 0 0 5px}.tab:last-child{border-right:0;border-radius:0 5px 5px 0}.tab.active{background:#2f7fe4}.meta{display:flex;align-items:center;gap:18px;color:#777;font-size:15px}.status-dot{width:8px;height:8px;border-radius:50%;background:#6fa0e8;display:inline-block}.status-dot.error{background:#c94a4a}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--line)}.summary-cell{padding:30px 42px;border-right:1px solid var(--line)}.summary-cell:last-child{border-right:0}.summary-label{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#777}.summary-value{font-size:38px;font-weight:300;color:#222;margin-top:8px;line-height:1.2}
    .results-area{padding:42px}.section-title{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--line)}.section-title h2{font-size:34px;font-weight:700;color:#222}.section-note{font-size:14px;font-weight:300;color:#777;letter-spacing:.12em;text-transform:uppercase}
    .table-scroll{overflow-x:auto;border:1px solid var(--line)}table{width:100%;border-collapse:collapse}thead tr{background:#f5f5f5;border-bottom:1px solid var(--line)}th{padding:18px 24px;text-align:left;font-size:14px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#777}th.rank-col{width:86px;text-align:center}th.time-col{text-align:right;width:140px}tbody tr{border-bottom:1px solid var(--line)}tbody tr:last-child{border-bottom:none}tbody tr:hover{background:#fafafa}td{padding:18px 24px;font-size:18px;color:#222}td.rank-col{text-align:center}.rank-badge{display:inline-block;min-width:38px;padding:3px 8px;border-radius:3px;background:#efefef;color:#555;font-weight:700;font-size:14px}.top-1 .rank-badge{background:#d8b874;color:#111}.top-2 .rank-badge{background:#a9a9a9;color:#111}.top-3 .rank-badge{background:#8c7651;color:#fff}.time-cell{text-align:right;font-weight:700}.state-msg{text-align:center;padding:58px 32px;color:#777;font-style:italic}.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#2f7fe4;border-radius:50%;animation:spin .9s linear infinite;vertical-align:middle;margin-right:8px}@keyframes spin{to{transform:rotate(360deg)}}
    footer{color:rgba(255,255,255,.5);text-align:center;font-size:13px;letter-spacing:.08em;padding:26px 20px;border-top:1px solid rgba(255,255,255,.08)}
    @media(max-width:800px){.hero{min-height:430px}header{height:auto;min-height:84px;padding:16px 22px;align-items:flex-start;flex-direction:column;gap:14px}.brand{font-size:24px}.brand-icon{width:52px;height:52px}nav{gap:18px;flex-wrap:wrap}nav a{font-size:18px}.hero-title h1{font-size:64px}.hero-title p{font-size:16px}.panel{width:92vw}.controls,.results-area{padding:24px}.summary{grid-template-columns:1fr}.summary-cell{border-right:0;border-bottom:1px solid var(--line)}.summary-cell:last-child{border-bottom:0}.summary-value{font-size:30px}.tab{padding:12px 18px}td,th{padding:14px 16px}}
  </style>
</head>
<body>
<section class="hero">
  <header><a class="brand" href="https://www.broadoakstables.com/broad-oak-stables" target="_blank"><span class="brand-icon"><img src="https://www.broadoakstables.com/favicon.ico" onerror="this.style.display='none';this.parentElement.textContent='BOS';" alt="BOS"/></span><span>Broad Oak Stables</span></a><nav><a href="https://www.broadoakstables.com/broad-oak-stables" target="_blank">Broad Oak Stables</a><a href="https://www.broadoakstables.com/broad-oak-stables/calender" target="_blank">Calendar</a><a href="https://www.broadoakstables.com/radio" target="_blank">Radio</a><span class="search">⌕</span></nav></header>
  <div class="hero-title"><h1>Apple Run Results</h1><p>Broad Oak Stables Racing Scoreboard</p></div>
</section>
<section class="content-band">
  <div class="panel">
    <div class="controls"><div class="tabs"><button class="tab active" id="top-tab" onclick="setView('top')">Top 10</button><button class="tab" id="recent-tab" onclick="setView('recent')">Recent 10</button></div><div class="meta"><span class="status-dot" id="dot"></span><span id="updated">Fetching results...</span><span id="countdown"></span></div></div>
    <div class="summary"><div class="summary-cell"><div class="summary-label">Race</div><div class="summary-value" id="race-name">Apple Run</div></div><div class="summary-cell"><div class="summary-label">Finishers</div><div class="summary-value" id="finish-count">-</div></div><div class="summary-cell"><div class="summary-label">Data Source</div><div class="summary-value" id="source-name">Live</div></div></div>
    <div class="results-area"><div class="section-title"><h2 id="section-title">Top 10</h2><span class="section-note" id="section-note">Best team times</span></div><div class="table-scroll"><table id="tbl"><tbody><tr><td class="state-msg"><span class="spinner"></span>Loading results...</td></tr></tbody></table></div></div>
  </div>
</section>
<footer>Broad Oak Stables &nbsp;·&nbsp; Apple Run Results</footer>
<script>
  var APPS_URL='https://script.google.com/macros/s/AKfycbzlxulprO4f8POgPJm8Tz9AlNBay2ZXqqNnjLSFvHhAeaxHhd3gI65bK_KnZfaoKews/exec';var REFRESH_MS=30000;var nextAt=Date.now()+REFRESH_MS;var currentView='top';var latest=null;var seq=0;fetchScores();tick();setInterval(function(){nextAt=Date.now()+REFRESH_MS;fetchScores();},REFRESH_MS);setInterval(tick,10000);
  function setView(view){currentView=view;document.getElementById('top-tab').className='tab'+(view==='top'?' active':'');document.getElementById('recent-tab').className='tab'+(view==='recent'?' active':'');render();}
  function fetchScores(){var cb='bosWebResults'+(++seq);var script=document.createElement('script');var done=false;var timer=setTimeout(function(){cleanup(false);},8000);window[cb]=function(data){latest=data;document.getElementById('race-name').textContent=data.race||'Apple Run';document.getElementById('finish-count').textContent=data.count||0;document.getElementById('updated').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});dot('ok');render();cleanup(true);};script.onerror=function(){cleanup(false);};script.src=APPS_URL+'?action=scoreboard&callback='+cb+'&_t='+Date.now();document.body.appendChild(script);function cleanup(ok){if(done)return;done=true;clearTimeout(timer);try{delete window[cb];}catch(e){window[cb]=undefined;}if(script.parentNode)script.parentNode.removeChild(script);if(!ok){dot('error');if(!latest)showState('Could not load live results.');}}}
  function render(){if(!latest)return;var rows=currentView==='top'?dedupe(latest.results||[]):((latest.recent||[]).slice(0,10));document.getElementById('section-title').textContent=currentView==='top'?'Top 10':'Recent 10';document.getElementById('section-note').textContent=currentView==='top'?'Best team times':'Newest finishes first';if(!rows.length){showState('No results yet.');return;}var head='<thead><tr><th class="rank-col">#</th><th>Driver</th><th>Pony</th><th class="time-col">Time</th></tr></thead>';var body='<tbody>'+rows.map(function(r,i){var rank=currentView==='top'?(r.rank||i+1):i+1;var cls=currentView==='top'&&rank<=3?' class="top-'+rank+'"':'';return '<tr'+cls+'><td class="rank-col"><span class="rank-badge">'+rank+'</span></td><td>'+esc(r.driver)+'</td><td>'+esc(r.pony)+'</td><td class="time-cell">'+esc(r.time)+'</td></tr>';}).join('')+'</tbody>';document.getElementById('tbl').innerHTML=head+body;}
  function dedupe(results){var seen={},rows=[];for(var i=0;i<results.length;i++){var r=results[i],k=String(r.driver+'|'+r.pony).toLowerCase();if(!seen[k]){seen[k]=true;rows.push(r);}if(rows.length>=10)break;}return rows;}function showState(msg){document.getElementById('tbl').innerHTML='<tbody><tr><td class="state-msg">'+esc(msg)+'</td></tr></tbody>';}function tick(){var s=Math.max(0,Math.round((nextAt-Date.now())/1000));document.getElementById('countdown').textContent='Refreshes in '+s+'s';}function dot(s){document.getElementById('dot').className='status-dot'+(s==='error'?' error':'');}function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
