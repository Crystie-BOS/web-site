<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1024, height=528, initial-scale=1.0"/>
  <title>BOS Live Scoreboard</title>
  <meta http-equiv="refresh" content="60">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#080706;--text:#e8f1f7;--strong:#ffffff;--muted:rgba(232,241,247,.52);--line:rgba(232,241,247,.22);--line2:rgba(232,241,247,.12);--cool:#b9d4e6;--warn:#d99898}
    html,body{margin:0;padding:0;background:var(--bg);font-family:'Lato',sans-serif;overflow:hidden;width:1024px;height:528px;color:var(--text)}
    .board{width:1024px;height:528px;display:flex;flex-direction:column;box-sizing:border-box;padding:22px 42px 18px;background:radial-gradient(ellipse at center,rgba(255,255,255,.045) 0%,rgba(0,0,0,0) 58%),linear-gradient(180deg,#100e0c 0%,#050403 100%);text-shadow:0 2px 5px rgba(0,0,0,.92),0 0 12px rgba(0,0,0,.82)}
    .topline{display:flex;align-items:flex-end;justify-content:space-between;height:30px;margin-bottom:9px;flex-shrink:0}
    .race{font-size:21px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:var(--strong)}
    .view-label{font-size:18px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--cool);text-align:right;white-space:nowrap}
    .col-headers{display:grid;grid-template-columns:70px 350px 1fr 120px;gap:12px;padding:0 10px 9px;border-bottom:2px solid var(--line);margin-bottom:3px;flex-shrink:0}
    .col-head{font-size:17px;font-weight:900;color:var(--cool);letter-spacing:.16em;text-transform:uppercase}.col-head.right{text-align:right}
    .results{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
    .row{display:grid;grid-template-columns:70px 350px 1fr 120px;gap:12px;align-items:center;height:38px;padding:0 10px;border-bottom:1px solid var(--line2);box-sizing:border-box;flex-shrink:0;background:transparent}
    .row.r1{border-bottom-color:rgba(232,241,247,.32)}
    .num{font-size:25px;font-weight:900;text-align:center;color:rgba(232,241,247,.68)}.r1 .num{color:var(--strong)}
    .cell{font-size:24px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.15}.r1 .cell{color:var(--strong);font-weight:900}.cell.t{text-align:right;font-weight:900;color:var(--strong)}
    .status{margin-top:8px;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;letter-spacing:.06em}
    .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--cool);margin-right:7px;animation:pulse 2.5s ease-in-out infinite;vertical-align:middle}.dot.err{background:var(--warn);animation:none}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
    .bar-wrap{height:2px;background:rgba(232,241,247,.12);margin-top:5px;overflow:hidden;flex-shrink:0}.bar{height:100%;background:var(--cool);transform-origin:left;width:100%;transition:transform 10s linear;opacity:.7}
    .msg{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;font-weight:700}.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(232,241,247,.18);border-top-color:var(--cool);border-radius:50%;animation:spin .9s linear infinite;vertical-align:middle;margin-right:8px}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="board">
  <div class="topline"><div class="race">Apple Run</div><div class="view-label" id="lbl"></div></div>
  <div class="col-headers"><div class="col-head">#</div><div class="col-head">Driver</div><div class="col-head">Pony</div><div class="col-head right">Time</div></div>
  <div class="results" id="res"><div class="msg"><span class="spin"></span>Loading...</div></div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div class="status"><span><span class="dot" id="dot"></span><span id="upd">Connecting...</span></span><span id="nxt"></span></div>
</div>
<script>
  var APPS_URL = 'https://script.google.com/macros/s/AKfycbzlxulprO4f8POgPJm8Tz9AlNBay2ZXqqNnjLSFvHhAeaxHhd3gI65bK_KnZfaoKews/exec';
  var VIEW_MS = 30000;
  var FETCH_MS = 10000;
  var latest = { results: [], recent: [] };
  var currentView = null;
  var seq = 0;

  updateView(true);
  fetchScores();
  resetBar();
  setInterval(tick, 1000);
  setInterval(fetchScores, FETCH_MS);
  setInterval(resetBar, FETCH_MS);

  function tick(){ updateView(false); }
  function getView(){ return (Math.floor(Date.now() / VIEW_MS) % 2 === 1) ? 'recent' : 'top'; }
  function updateView(force){
    var view = getView();
    var msUntilSwitch = VIEW_MS - (Date.now() % VIEW_MS);
    document.getElementById('nxt').textContent = 'Switches in ' + Math.ceil(msUntilSwitch / 1000) + 's';
    if (!force && view === currentView) return;
    currentView = view;
    document.getElementById('lbl').textContent = view === 'recent' ? 'Recent 10' : 'Top 10';
    render(latest.results || [], latest.recent || []);
  }
  function resetBar(){
    var bar = document.getElementById('bar');
    bar.style.transition = 'none';
    bar.style.transform = 'scaleX(1)';
    setTimeout(function(){bar.style.transition='transform 10s linear';bar.style.transform='scaleX(0)';},50);
  }
  function fetchScores(){
    var cb = 'bosLiveScores' + (++seq);
    var done = false;
    var script = document.createElement('script');
    var timer = setTimeout(function(){ cleanup(false); }, 7000);
    window[cb] = function(data){
      latest = data || latest;
      render(latest.results || [], latest.recent || []);
      document.getElementById('upd').textContent = 'Live ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      document.getElementById('dot').className = 'dot';
      cleanup(true);
    };
    script.onerror = function(){ cleanup(false); };
    script.src = APPS_URL + '?action=scoreboard&callback=' + cb + '&_t=' + Date.now();
    document.body.appendChild(script);
    function cleanup(ok){
      if (done) return;
      done = true;
      clearTimeout(timer);
      try { delete window[cb]; } catch(e) { window[cb] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
      if (!ok) err('Live data timeout');
    }
  }
  function render(results, recent){
    var el = document.getElementById('res');
    if (currentView !== 'recent'){
      if (!results.length){ el.innerHTML = '<div class="msg">No results yet</div>'; return; }
      var seen = {}, rows = [];
      for (var i=0;i<results.length;i++){
        var r = results[i], k = (r.driver+'|'+r.pony).toLowerCase();
        if (!seen[k]){ seen[k]=true; rows.push(r); }
        if (rows.length >= 10) break;
      }
      build(el, rows, false);
    } else {
      if (!recent.length){ el.innerHTML = '<div class="msg">No runs yet</div>'; return; }
      build(el, recent.slice(0,10), true);
    }
  }
  function build(el, rows, isRecent){
    var h = '';
    for (var i=0;i<rows.length;i++){
      var r = rows[i], cls = (!isRecent && r.rank <= 3) ? ' r'+r.rank : '';
      h += '<div class="row'+cls+'"><div class="num">'+(i+1)+'</div><div class="cell">'+esc(r.driver)+'</div><div class="cell">'+esc(r.pony)+'</div><div class="cell t">'+esc(r.time)+'</div></div>';
    }
    el.innerHTML = h;
  }
  function err(m){ document.getElementById('res').innerHTML = '<div class="msg" style="color:rgba(255,150,150,.95)">! '+esc(m)+'</div>'; document.getElementById('dot').className='dot err'; }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
