<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1024, height=528, initial-scale=1.0"/>
  <title>BOS Live Scoreboard</title>
  <meta http-equiv="refresh" content="60">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;padding:0;background:#1a1714;font-family:'Lato',sans-serif;overflow:hidden;width:1024px;height:528px}
    .board{width:1024px;height:528px;display:flex;flex-direction:column;padding:16px 24px 12px;box-sizing:border-box;position:relative}
    .view-label{position:absolute;top:10px;right:18px;font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,169,110,.75);text-shadow:0 1px 5px rgba(0,0,0,.95)}
    .col-headers{display:grid;grid-template-columns:52px 340px 1fr 110px;gap:8px;padding:0 6px 8px;border-bottom:1px solid rgba(201,169,110,.5);margin-bottom:8px;flex-shrink:0}
    .col-head{font-size:13px;font-weight:700;color:rgba(201,169,110,.9);text-shadow:0 1px 5px rgba(0,0,0,.95);letter-spacing:.16em;text-transform:uppercase}.col-head.right{text-align:right}
    .results{flex:1;display:flex;flex-direction:column;gap:3px;overflow:hidden}
    .row{display:grid;grid-template-columns:52px 340px 1fr 110px;gap:8px;align-items:center;padding:5px 6px;border-radius:3px;background:rgba(255,255,255,.04);flex-shrink:0}
    .row.r1{background:rgba(201,169,110,.18)}.row.r2{background:rgba(160,120,64,.14)}.row.r3{background:rgba(107,79,42,.12)}
    .num{font-size:20px;font-weight:900;text-align:center;color:rgba(255,255,255,.45)}.r1 .num{color:#c9a96e}.r2 .num{color:#a07840}.r3 .num{color:#8a6535}
    .cell{font-size:19px;font-weight:400;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.r1 .cell{font-weight:700}.cell.t{text-align:right;font-weight:700}
    .status{margin-top:6px;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:300;color:rgba(255,255,255,.35);flex-shrink:0}
    .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#c9a96e;margin-right:6px;animation:pulse 2.5s ease-in-out infinite;vertical-align:middle}.dot.err{background:#c94a4a;animation:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
    .bar-wrap{height:2px;background:rgba(255,255,255,.07);margin-top:4px;overflow:hidden;flex-shrink:0}.bar{height:100%;background:rgba(201,169,110,.4);transform-origin:left;width:100%;transition:transform 10s linear}
    .msg{flex:1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);font-size:15px}.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.15);border-top-color:#c9a96e;border-radius:50%;animation:spin .9s linear infinite;vertical-align:middle;margin-right:8px}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="board">
  <div class="view-label" id="lbl"></div>
  <div class="col-headers"><div class="col-head">#</div><div class="col-head">Driver</div><div class="col-head">Pony</div><div class="col-head right">Time</div></div>
  <div class="results" id="res"><div class="msg"><span class="spin"></span>Loading...</div></div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div class="status"><span><span class="dot" id="dot"></span><span id="upd">Connecting...</span></span><span id="nxt"></span></div>
</div>
<script>
  var APPS_URL = 'https://script.google.com/macros/s/AKfycbzlxulprO4f8POgPJm8Tz9AlNBay2ZXqqNnjLSFvHhAeaxHhd3gI65bK_KnZfaoKews/exec';
  var VIEW_MS = 30000;
  var FETCH_MS = 10000;
  var latest = { results: [], recent: [] };
  var currentView = null;
  var seq = 0;

  updateView(true);
  fetchScores();
  resetBar();
  setInterval(tick, 1000);
  setInterval(fetchScores, FETCH_MS);
  setInterval(resetBar, FETCH_MS);

  function tick(){ updateView(false); }
  function getView(){ return (Math.floor(Date.now() / VIEW_MS) % 2 === 1) ? 'recent' : 'top'; }
  function updateView(force){
    var view = getView();
    var msUntilSwitch = VIEW_MS - (Date.now() % VIEW_MS);
    document.getElementById('nxt').textContent = 'Switches in ' + Math.ceil(msUntilSwitch / 1000) + 's';
    if (!force && view === currentView) return;
    currentView = view;
    document.getElementById('lbl').textContent = view === 'recent' ? 'Recent 10' : 'Top 10';
    render(latest.results || [], latest.recent || []);
  }
  function resetBar(){
    var bar = document.getElementById('bar');
    bar.style.transition = 'none';
    bar.style.transform = 'scaleX(1)';
    setTimeout(function(){bar.style.transition='transform 10s linear';bar.style.transform='scaleX(0)';},50);
  }
  function fetchScores(){
    var cb = 'bosLiveScores' + (++seq);
    var done = false;
    var script = document.createElement('script');
    var timer = setTimeout(function(){ cleanup(false); }, 7000);
    window[cb] = function(data){
      latest = data || latest;
      render(latest.results || [], latest.recent || []);
      document.getElementById('upd').textContent = 'Live ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      document.getElementById('dot').className = 'dot';
      cleanup(true);
    };
    script.onerror = function(){ cleanup(false); };
    script.src = APPS_URL + '?action=scoreboard&callback=' + cb + '&_t=' + Date.now();
    document.body.appendChild(script);
    function cleanup(ok){
      if (done) return;
      done = true;
      clearTimeout(timer);
      try { delete window[cb]; } catch(e) { window[cb] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
      if (!ok) err('Live data timeout');
    }
  }
  function render(results, recent){
    var el = document.getElementById('res');
    if (currentView !== 'recent'){
      if (!results.length){ el.innerHTML = '<div class="msg">No results yet</div>'; return; }
      var seen = {}, rows = [];
      for (var i=0;i<results.length;i++){
        var r = results[i], k = (r.driver+'|'+r.pony).toLowerCase();
        if (!seen[k]){ seen[k]=true; rows.push(r); }
        if (rows.length >= 10) break;
      }
      build(el, rows, false);
    } else {
      if (!recent.length){ el.innerHTML = '<div class="msg">No runs yet</div>'; return; }
      build(el, recent.slice(0,10), true);
    }
  }
  function build(el, rows, isRecent){
    var h = '';
    for (var i=0;i<rows.length;i++){
      var r = rows[i], cls = (!isRecent && r.rank <= 3) ? ' r'+r.rank : '';
      h += '<div class="row'+cls+'"><div class="num">'+(i+1)+'</div><div class="cell">'+esc(r.driver)+'</div><div class="cell">'+esc(r.pony)+'</div><div class="cell t">'+esc(r.time)+'</div></div>';
    }
    el.innerHTML = h;
  }
  function err(m){ document.getElementById('res').innerHTML = '<div class="msg" style="color:rgba(255,120,120,.9)">! '+esc(m)+'</div>'; document.getElementById('dot').className='dot err'; }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
