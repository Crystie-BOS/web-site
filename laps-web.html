<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BOS Lap Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #28262d;
      --surface: #322f38;
      --border: rgba(255,255,255,.09);
      --text: #ede8df;
      --muted: rgba(237,232,223,.48);
      --strong: #ffffff;
      --cool: #c9a96e;
      --cool2: #a8834a;
      --gold: #ffd700;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
      --highlight: rgba(201,169,110,.15);
      --highlight-border: rgba(201,169,110,.45);
      --green: #8fbc6e;
      --warn: #d99898;
      --radius: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      font-family: 'Lato', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── WRAPPER ── */
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    /* ── SEARCH ── */
    .search-wrap {
      position: relative;
      margin-bottom: 18px;
    }

    /* ── TOGGLE UNIT ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 14px;
    }
    .unit-label { font-size: 13px; color: var(--muted); letter-spacing: .06em; }
    .toggle-group {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .toggle-group button {
      padding: 5px 14px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .toggle-group button.active {
      background: var(--cool2);
      color: #fff;
    }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--cool);
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    thead th.right { text-align: right; }
    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,.05);
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.03); }

    td {
      padding: 11px 16px;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    td.right { text-align: right; }

    /* rank cell */
    .rank {
      width: 52px;
      font-size: 18px;
      font-weight: 900;
      text-align: center;
      color: var(--muted);
    }
    tr.r1 .rank { color: var(--gold); }
    tr.r2 .rank { color: var(--silver); }
    tr.r3 .rank { color: var(--bronze); }

    /* distance pill */
    .dist {
      font-size: 15px;
      font-weight: 700;
      color: var(--green);
    }

    /* ── STATUS BAR ── */
    .status {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .06em;
    }
    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 2.5s ease-in-out infinite;
    }
    .dot.err { background: var(--warn); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── EMPTY / LOADING ── */
    .msg-row td {
      text-align: center;
      color: var(--muted);
      padding: 40px;
      font-size: 16px;
    }
    .spin {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(232,241,247,.18);
      border-top-color: var(--cool);
      border-radius: 50%;
      animation: spin .9s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>
<div class="wrap">

  <div class="controls">
    <span class="unit-label">Distance unit:</span>
    <div class="toggle-group">
      <button id="btnMi" class="active" onclick="setUnit('mi')">Miles</button>
      <button id="btnKm" onclick="setUnit('km')">KM</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="rank">#</th>
          <th>Name</th>
          <th class="right">Laps</th>
          <th class="right">Last 24 Hrs</th>
          <th class="right" id="distHead">Distance (mi)</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr class="msg-row"><td colspan="5"><span class="spin"></span>Loading data…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="status">
    <span><span class="dot" id="dot"></span><span id="upd">Connecting…</span></span>
    <span id="nxt"></span>
  </div>

</div>
<script>
  var APPS_URL = 'https://script.google.com/macros/s/AKfycbw-VEpd9S0oWAG_nv6FnQofTHENMnDIqkPwBI62rsBOmoRG6_20OSyf7NMFlBh3OuqC/exec';
  var METERS_PER_LAP = 83.57;
  var FETCH_MS = 30000;
  var seq = 0;
  var allRows = [];     // full sorted list from API
  var unit = 'mi';

  // ── Distance conversion ──────────────────────────────────────────────────
  function toDistance(laps) {
    var meters = laps * METERS_PER_LAP;
    if (unit === 'km') return (meters / 1000).toFixed(2) + ' km';
    return (meters / 1609.344).toFixed(2) + ' mi';
  }

  // ── Unit toggle ──────────────────────────────────────────────────────────
  function setUnit(u) {
    unit = u;
    document.getElementById('btnMi').classList.toggle('active', u === 'mi');
    document.getElementById('btnKm').classList.toggle('active', u === 'km');
    document.getElementById('distHead').textContent = u === 'km' ? 'Distance (km)' : 'Distance (mi)';
    renderTable();
  }

  // ── Render ───────────────────────────────────────────────────────────────
  function renderTable() {
    var tbody = document.getElementById('tbody');
    if (!allRows.length) {
      tbody.innerHTML = '<tr class="msg-row"><td colspan="5">No data available.</td></tr>';
      return;
    }
    var h = '';
    allRows.forEach(function(r) {
      var rankClass = r._rank <= 3 ? ' r' + r._rank : '';
      var laps24 = r.laps24 > 0 ? esc(r.laps24) : '<span style="color:var(--muted)">—</span>';
      h += '<tr class="' + rankClass.trim() + '">'
        + '<td class="rank">' + r._rank + '</td>'
        + '<td>' + esc(r.name) + '</td>'
        + '<td class="right">' + esc(r.laps) + '</td>'
        + '<td class="right" style="color:var(--cool)">' + laps24 + '</td>'
        + '<td class="right dist">' + toDistance(r.laps) + '</td>'
        + '</tr>';
    });
    tbody.innerHTML = h;
  }

  // ── Fetch ────────────────────────────────────────────────────────────────
  function fetchScores() {
    var cb = 'bosLapWeb' + (++seq);
    var done = false;
    var script = document.createElement('script');
    var timer = setTimeout(function() { cleanup(false); }, 9000);

    window[cb] = function(data) {
      if (data) {
        var alltime = (data.alltime && data.alltime.length) ? data.alltime : [];
        var recent  = (data.results && data.results.length) ? data.results : [];

        // build name→laps lookup for last 24h
        var map24 = {};
        recent.forEach(function(r) { map24[r.name] = Number(r.laps) || 0; });

        allRows = alltime.map(function(r, i) {
          return { name: r.name, laps: Number(r.laps) || 0, laps24: map24[r.name] || 0, _rank: i + 1 };
        });
        renderTable();
        document.getElementById('upd').textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        document.getElementById('dot').className = 'dot';
      }
      cleanup(true);
    };

    script.onerror = function() { cleanup(false); };
    script.src = APPS_URL + '?action=scoreboard&callback=' + cb + '&_t=' + Date.now();
    document.body.appendChild(script);

    function cleanup(ok) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      try { delete window[cb]; } catch(e) { window[cb] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
      if (!ok) {
        document.getElementById('dot').className = 'dot err';
        document.getElementById('upd').textContent = 'Connection error — retrying…';
      }
    }
  }

  // ── Countdown ────────────────────────────────────────────────────────────
  var countdown = FETCH_MS / 1000;
  setInterval(function() {
    countdown--;
    if (countdown <= 0) {
      countdown = FETCH_MS / 1000;
      fetchScores();
    }
    document.getElementById('nxt').textContent = 'Refreshes in ' + countdown + 's';
  }, 1000);

  // ── Init ─────────────────────────────────────────────────────────────────
  fetchScores();

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
