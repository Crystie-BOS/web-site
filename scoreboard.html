<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scoreboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0; padding: 0;
      background: transparent !important;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
      width: 100vw; height: 100vh;
    }

    .board {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 10px 14px 8px;
      box-sizing: border-box;
    }

    /* View label — small indicator top-right */
    .view-label {
      position: absolute;
      top: 6px; right: 10px;
      font-size: clamp(8px, 1.2vw, 11px);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(201,169,110,0.7);
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }

    /* Column headers */
    .col-headers {
      display: grid;
      grid-template-columns: 40px 1fr 1fr 80px;
      gap: 4px;
      padding: 0 4px 5px;
      border-bottom: 1px solid rgba(201,169,110,0.4);
      margin-bottom: 6px;
    }
    .col-head {
      font-size: clamp(8px, 1.4vw, 12px);
      font-weight: 700;
      color: rgba(201,169,110,0.85);
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .col-head.right { text-align: right; }

    /* Results list */
    .results {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }

    .result-row {
      display: grid;
      grid-template-columns: 40px 1fr 1fr 80px;
      gap: 4px;
      align-items: center;
      padding: 3px 4px;
      border-radius: 2px;
      background: rgba(0,0,0,0.22);
      transition: opacity 0.4s ease;
    }

    .result-row.rank-1 { background: rgba(201,169,110,0.16); }
    .result-row.rank-2 { background: rgba(160,120,64,0.12); }
    .result-row.rank-3 { background: rgba(107,79,42,0.12); }

    .rank-badge {
      font-size: clamp(12px, 2.2vw, 20px);
      font-weight: 900;
      text-align: center;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      color: rgba(255,255,255,0.5);
    }
    .rank-1 .rank-badge { color: #c9a96e; }
    .rank-2 .rank-badge { color: #a07840; }
    .rank-3 .rank-badge { color: #8a6535; }

    .cell {
      font-size: clamp(11px, 2vw, 17px);
      font-weight: 400;
      color: #ffffff;
      text-shadow: 0 1px 5px rgba(0,0,0,0.95);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rank-1 .cell { font-weight: 700; }

    .cell.time {
      text-align: right;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
    }

    /* Status bar */
    .status-bar {
      margin-top: 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: clamp(7px, 1.1vw, 10px);
      font-weight: 300;
      color: rgba(255,255,255,0.4);
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      letter-spacing: 0.06em;
    }

    .live-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #c9a96e;
      margin-right: 5px;
      animation: pulse 2s ease-in-out infinite;
      vertical-align: middle;
    }
    .live-dot.error { background: #c94a4a; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

    .refresh-bar {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin-top: 3px;
      overflow: hidden;
    }
    .refresh-fill {
      height: 100%;
      background: rgba(201,169,110,0.45);
      transform-origin: left;
      width: 100%;
      transition: transform linear;
    }

    .loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      font-weight: 300;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }
    .spinner {
      display: inline-block;
      width: 11px; height: 11px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #c9a96e;
      border-radius: 50%;
      animation: spin .9s linear infinite;
      vertical-align: middle;
      margin-right: 7px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Fade transition between views */
    .results.fade { opacity: 0; }
  </style>
</head>
<body>
<div class="board">
  <div class="view-label" id="view-label">Top 10</div>

  <div class="col-headers">
    <div class="col-head">#</div>
    <div class="col-head">Driver</div>
    <div class="col-head">Pony</div>
    <div class="col-head right">Time</div>
  </div>

  <div class="results" id="results">
    <div class="loading"><span class="spinner"></span>Loading…</div>
  </div>

  <div class="refresh-bar"><div class="refresh-fill" id="bar"></div></div>
  <div class="status-bar">
    <span><span class="live-dot" id="dot"></span><span id="updated">Connecting…</span></span>
    <span id="countdown"></span>
  </div>
</div>

<script>
  const APPS_URL   = 'https://script.google.com/macros/s/AKfycbzXmU9arfclLttwGc3jPVFwxb46GP7Ezq6hZdIJrjbiOa_p_xI5XBld7bK4946A2ZxX/exec';
  const REFRESH_MS = 30000;
  const ROTATE_MS  = 10000; // switch view every 10 seconds

  let allResults  = [];    // full sorted results from API
  let currentView = 'top'; // 'top' or 'recent'
  let nextAt      = Date.now() + REFRESH_MS;
  let rotateTimer = null;

  // ── URL param: ?view=top|recent|rotate (default: rotate) ──────────────
  const urlParams = new URLSearchParams(window.location.search);
  const viewParam = urlParams.get('view') || 'rotate';

  fetch_data();
  bar();
  tick();
  setInterval(() => { nextAt = Date.now() + REFRESH_MS; fetch_data(); bar(); }, REFRESH_MS);
  setInterval(tick, 5000);

  // Only rotate if not pinned to a specific view
  if (viewParam === 'rotate') {
    rotateTimer = setInterval(toggleView, ROTATE_MS);
  } else {
    currentView = viewParam === 'recent' ? 'recent' : 'top';
  }

  // ── External trigger — LSL or buttons can call:
  //   scoreboard.html?view=top    → always shows top 10
  //   scoreboard.html?view=recent → always shows last 10
  //   scoreboard.html?view=rotate → auto-rotates every 10s (default)
  // ── Or call window.setView('top'|'recent') from another script ────────
  window.setView = function(v) {
    currentView = v;
    renderCurrent();
  };

  async function fetch_data() {
    set_dot('loading');
    try {
      const res = await fetch(APPS_URL + '?action=scoreboard&_t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      allResults = json.results || [];
      renderCurrent();
      document.getElementById('updated').textContent =
        new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      set_dot('ok');
    } catch(e) {
      document.getElementById('results').innerHTML =
        '<div class="loading" style="color:rgba(255,100,100,0.7)">⚠ ' + e.message + '</div>';
      set_dot('error');
    }
  }

  function toggleView() {
    currentView = currentView === 'top' ? 'recent' : 'top';
    renderCurrent(true);
  }

  function renderCurrent(fade) {
    const el = document.getElementById('results');
    const label = document.getElementById('view-label');

    if (fade) {
      el.classList.add('fade');
      setTimeout(() => {
        doRender(el, label);
        el.classList.remove('fade');
      }, 400);
    } else {
      doRender(el, label);
    }
  }

  function doRender(el, label) {
    if (!allResults.length) {
      el.innerHTML = '<div class="loading">No results yet</div>';
      return;
    }

    if (currentView === 'top') {
      label.textContent = 'Top 10';
      // Deduplicate by driver+pony team — keep their best (lowest) rank
      const seen = new Set();
      const deduped = [];
      for (const r of allResults) {
        const key = (r.driver + '|' + r.pony).toLowerCase();
        if (!seen.has(key)) {
          seen.add(key);
          deduped.push(r);
        }
      }
      render(el, deduped.slice(0, 10), false);

    } else {
      label.textContent = 'Recent 10';
      // Last 10 finishers = bottom of the sorted list reversed
      const recent = allResults.slice(-10).reverse();
      render(el, recent, true);
    }
  }

  function render(el, rows, showOrder) {
    el.innerHTML = rows.map((r, i) => {
      const display = showOrder ? (i + 1) : r.rank;
      const cls = r.rank <= 3 ? ' rank-' + r.rank : '';
      return '<div class="result-row' + cls + '">' +
        '<div class="rank-badge">' + display + '</div>' +
        '<div class="cell">' + esc(r.driver) + '</div>' +
        '<div class="cell">' + esc(r.pony) + '</div>' +
        '<div class="cell time">' + esc(r.time) + '</div>' +
      '</div>';
    }).join('');
  }

  function bar() {
    const b = document.getElementById('bar');
    b.style.transition = 'none'; b.style.transform = 'scaleX(1)';
    requestAnimationFrame(() => {
      b.style.transition = 'transform ' + REFRESH_MS + 'ms linear';
      b.style.transform = 'scaleX(0)';
    });
  }

  function tick() {
    const s = Math.max(0, Math.round((nextAt - Date.now()) / 1000));
    document.getElementById('countdown').textContent =
      'Refreshes in ' + Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  function set_dot(s) {
    document.getElementById('dot').className = 'live-dot' + (s === 'error' ? ' error' : '');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
