<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apple Run Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #28262d;
      --surface: #322f38;
      --border: rgba(255,255,255,.09);
      --text: #ede8df;
      --muted: rgba(237,232,223,.48);
      --strong: #ffffff;
      --cool: #c9a96e;
      --cool2: #a8834a;
      --gold: #ffd700;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
      --green: #8fbc6e;
      --warn: #d99898;
      --highlight: rgba(201,169,110,.15);
      --highlight-border: rgba(201,169,110,.45);
      --radius: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); font-family: 'Lato', sans-serif; color: var(--text); min-height: 100vh; }

    .wrap { max-width: 900px; margin: 0 auto; padding: 20px 20px 32px; }

    /* ── SEARCH ── */
    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-wrap svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); width: 17px; height: 17px; pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 11px 14px 11px 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      font-weight: 400;
      outline: none;
      transition: border-color .2s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--cool2); }

    /* ── TOGGLE ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .toggle-label { font-size: 12px; color: var(--muted); letter-spacing: .06em; font-weight: 700; }
    .toggle-group {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .toggle-group button {
      padding: 4px 14px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Lato', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .toggle-group button.active { background: var(--cool2); color: #fff; }

    /* ── BANNER / NO MATCH ── */
    .banner {
      display: none;
      background: var(--highlight);
      border: 1px solid var(--highlight-border);
      border-radius: var(--radius);
      padding: 8px 14px;
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 700;
      color: var(--cool);
    }
    .banner.show { display: block; }
    .no-match { display: none; font-size: 13px; font-weight: 700; color: var(--warn); margin-bottom: 10px; }
    .no-match.show { display: block; }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--cool);
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    thead th.right { text-align: right; }
    thead th.center { text-align: center; }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,.04); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    td {
      padding: 9px 14px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    td.right { text-align: right; }
    td.center { text-align: center; }

    .rank-cell { width: 44px; font-size: 15px; font-weight: 900; text-align: center; color: var(--muted); }
    tr.r1 .rank-cell { color: var(--gold); }
    tr.r2 .rank-cell { color: var(--silver); }
    tr.r3 .rank-cell { color: var(--bronze); }
    .time-cell { font-weight: 900; color: var(--green); text-align: right; }

    /* hint */
    .hint { text-align: center; color: var(--muted); font-size: 14px; font-weight: 700; padding: 32px 0; }

    /* msg row */
    .msg-row td { text-align: center; color: var(--muted); padding: 28px; font-size: 14px; }
    .spin {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(237,232,223,.15); border-top-color: var(--cool);
      border-radius: 50%; animation: spin .9s linear infinite;
      vertical-align: middle; margin-right: 7px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="search" id="search" placeholder="Search by driver or animal…" autocomplete="off" spellcheck="false"/>
  </div>

  <div class="toggle-wrap">
    <span class="toggle-label">Search by:</span>
    <div class="toggle-group">
      <button id="btnDriver" class="active" onclick="setMode('driver')">Driver</button>
      <button id="btnAnimal" onclick="setMode('animal')">Animal</button>
      <button id="btnBoth" onclick="setMode('both')">Both</button>
    </div>
  </div>

  <div class="banner" id="banner"></div>
  <div class="no-match" id="noMatch">No runs found matching that name.</div>

  <div id="tableArea">
    <div class="hint">Search a driver or animal name to see their runs</div>
  </div>

</div>
<script>
  var APPS_URL = 'https://script.google.com/macros/s/AKfycbzlxulprO4f8POgPJm8Tz9AlNBay2ZXqqNnjLSFvHhAeaxHhd3gI65bK_KnZfaoKews/exec';
  var FETCH_MS = 30000;
  var seq = 0;
  var allRuns = [];   // flat list of every run from data.recent (full history if available)
  var allTop  = [];   // top results
  var mode = 'driver';

  function setMode(m) {
    mode = m;
    document.getElementById('btnDriver').classList.toggle('active', m === 'driver');
    document.getElementById('btnAnimal').classList.toggle('active', m === 'animal');
    document.getElementById('btnBoth').classList.toggle('active', m === 'both');
    render();
  }

  document.getElementById('search').addEventListener('input', render);

  function render() {
    var query = document.getElementById('search').value.trim().toLowerCase();
    var banner = document.getElementById('banner');
    var noMatch = document.getElementById('noMatch');
    var area = document.getElementById('tableArea');

    if (!query) {
      banner.classList.remove('show');
      noMatch.classList.remove('show');
      area.innerHTML = '<div class="hint">Search a driver or animal name to see their runs</div>';
      return;
    }

    // search across allRuns (recent) and allTop combined, deduplicate
    var source = allRuns.length ? allRuns : allTop;
    var matches = source.filter(function(r) {
      var d = (r.driver || '').toLowerCase();
      var p = (r.pony   || '').toLowerCase();
      if (mode === 'driver') return d.indexOf(query) !== -1;
      if (mode === 'animal') return p.indexOf(query) !== -1;
      return d.indexOf(query) !== -1 || p.indexOf(query) !== -1;
    });

    if (!matches.length) {
      banner.classList.remove('show');
      noMatch.classList.add('show');
      area.innerHTML = '';
      return;
    }

    noMatch.classList.remove('show');
    banner.textContent = matches.length + ' run' + (matches.length !== 1 ? 's' : '') + ' found';
    banner.classList.add('show');

    var h = '<div class="table-wrap"><table>'
      + '<thead><tr>'
      + '<th class="center">#</th>'
      + '<th>Driver</th>'
      + '<th>Animal</th>'
      + '<th class="right">Time</th>'
      + '</tr></thead><tbody>';

    matches.forEach(function(r, i) {
      var rank = i + 1;
      var rankCls = rank <= 3 ? ' r' + rank : '';
      h += '<tr class="' + rankCls.trim() + '">'
        + '<td class="rank-cell">' + rank + '</td>'
        + '<td>' + esc(r.driver || '') + '</td>'
        + '<td>' + esc(r.pony   || '') + '</td>'
        + '<td class="time-cell">' + esc(r.time || '') + '</td>'
        + '</tr>';
    });

    h += '</tbody></table></div>';
    area.innerHTML = h;
  }

  function fetchResults() {
    var cb = 'bosAppleSearch' + (++seq);
    var done = false;
    var script = document.createElement('script');
    var timer = setTimeout(function() { cleanup(false); }, 9000);

    window[cb] = function(data) {
      if (data) {
        allTop  = data.results || [];
        // use recent for full run history; fall back to top results
        allRuns = (data.recent && data.recent.length) ? data.recent : allTop;
        render();
      }
      cleanup(true);
    };

    script.onerror = function() { cleanup(false); };
    script.src = APPS_URL + '?action=scoreboard&callback=' + cb + '&_t=' + Date.now();
    document.body.appendChild(script);

    function cleanup(ok) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      try { delete window[cb]; } catch(e) { window[cb] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
    }
  }

  setInterval(fetchResults, FETCH_MS);
  fetchResults();

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
