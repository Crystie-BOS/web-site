<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Broad Oak Stables — Calendar</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#1f2020;--surface:#2a2b2b;--border:#3a3b3b;--text:#f2f2f2;--muted:#aaaaaa;--bold:#ffffff;--accent:#c9a96e;--font:'Lato',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;font-weight:300;line-height:1.7;min-height:100vh}
    header{background:rgba(31,32,32,.97);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
    .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--bold);font-family:var(--font);font-size:15px;font-weight:300}
    .brand-icon{width:36px;height:36px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .brand-icon img{width:100%;height:100%;object-fit:cover}
    nav{display:flex;align-items:center}
    nav a{color:var(--bold);text-decoration:none;font-family:var(--font);font-size:13px;font-weight:300;padding:6px 16px;letter-spacing:.04em;opacity:.85;transition:opacity .2s}
    nav a:hover{opacity:1}
    nav a.active{opacity:1;border-bottom:2px solid var(--accent)}
    .nav-sep{color:var(--border);font-size:18px;padding:0 4px}
    .wood-hero{position:relative;min-height:240px;display:flex;align-items:center;justify-content:center;overflow:hidden;background-color:#3a3836;background-image:repeating-linear-gradient(90deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 118px,rgba(0,0,0,.45) 118px,rgba(0,0,0,.45) 120px,rgba(255,255,255,.04) 120px,rgba(255,255,255,.04) 121px,rgba(0,0,0,0) 121px,rgba(0,0,0,0) 239px,rgba(0,0,0,.35) 239px,rgba(0,0,0,.35) 241px,rgba(255,255,255,.03) 241px,rgba(255,255,255,.03) 242px),repeating-linear-gradient(180deg,rgba(0,0,0,0) 0px,rgba(255,255,255,.012) 18px,rgba(0,0,0,.06) 36px,rgba(0,0,0,0) 54px,rgba(255,255,255,.008) 72px,rgba(0,0,0,.04) 90px),radial-gradient(ellipse 60px 40px at 20% 35%,rgba(0,0,0,.12) 0%,transparent 100%),radial-gradient(ellipse 40px 30px at 72% 65%,rgba(0,0,0,.10) 0%,transparent 100%),linear-gradient(180deg,#484644 0%,#3e3c3a 40%,#3a3836 70%,#343230 100%)}
    .wood-hero::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.30)}
    .wood-hero-inner{position:relative;z-index:1;text-align:center;padding:60px 32px}
    .wood-hero h1{font-family:var(--font);font-size:clamp(36px,5vw,68px);font-weight:300;color:#fff;line-height:1.1;letter-spacing:.01em;text-shadow:0 2px 24px rgba(0,0,0,.6)}
    .refresh-strip{height:2px;background:var(--border);overflow:hidden}
    .refresh-fill{height:100%;background:var(--accent);transform-origin:left;width:100%;transition:transform linear}
    .cal-controls{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .month-nav{display:flex;align-items:center;gap:16px}
    .month-nav button{background:none;border:1px solid var(--border);color:var(--bold);font-family:var(--font);font-weight:300;font-size:18px;width:32px;height:32px;border-radius:2px;cursor:pointer;transition:border-color .2s,color .2s;line-height:1}
    .month-nav button:hover{border-color:var(--accent);color:var(--accent)}
    .month-label{font-family:var(--font);font-size:18px;font-weight:300;color:var(--bold);min-width:200px;text-align:center;letter-spacing:.02em}
    .cal-meta{display:flex;align-items:center;gap:14px;font-size:12px;font-weight:300;color:var(--muted)}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:breathe 3s ease-in-out infinite;flex-shrink:0}
    .status-dot.error{background:#c94a4a;animation:none}
    @keyframes breathe{0%,100%{opacity:1}50%{opacity:.3}}
    .cal-wrap{padding:28px 32px 64px;max-width:1100px;margin:0 auto}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--border);overflow:hidden}
    .day-header{background:var(--surface);padding:8px 0;text-align:center;font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
    .day-header:not(:last-child){border-right:1px solid var(--border)}
    .day-cell{background:var(--bg);min-height:100px;padding:7px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .15s}
    .day-cell:nth-child(7n){border-right:none}
    .day-cell.other-month .day-num{opacity:.25}
    .day-cell.today .day-num{background:var(--accent);color:#111;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
    .day-cell:hover{background:var(--surface)}
    .day-num{font-family:var(--font);font-size:12px;font-weight:400;color:var(--text);margin-bottom:4px;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
    .event-pip{background:var(--accent);border-radius:2px;padding:2px 6px;margin-top:2px;font-size:10px;font-family:var(--font);font-weight:400;color:#111;cursor:default;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .more-label{font-size:10px;font-weight:300;color:var(--muted);margin-top:2px}
    .section-title{font-family:var(--font);font-size:20px;font-weight:700;color:var(--bold);margin:36px 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
    .event-list{display:flex;flex-direction:column;gap:1px;margin-bottom:48px}
    .event-row{background:var(--surface);border-left:3px solid var(--border);padding:14px 20px;display:grid;grid-template-columns:72px 1fr auto;align-items:center;gap:16px;transition:border-left-color .15s}
    .event-row:hover{border-left-color:var(--accent)}
    .event-date-block{text-align:center}
    .event-month{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-family:var(--font)}
    .event-day{font-family:var(--font);font-size:26px;font-weight:300;color:var(--bold);line-height:1}
    .event-name{font-family:var(--font);font-size:15px;font-weight:700;color:var(--bold);margin-bottom:3px}
    .event-desc{font-size:13px;font-weight:300;color:var(--muted);line-height:1.5}
    .event-time{font-family:var(--font);font-size:12px;font-weight:300;color:var(--accent);white-space:nowrap}
    .no-events{font-weight:300;font-style:italic;color:var(--muted);font-size:14px;padding:20px 0}
    .state-msg{text-align:center;padding:48px 32px;color:var(--muted);font-style:italic;font-size:14px;font-weight:300}
    .spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
    footer{border-top:1px solid var(--border);padding:20px 32px;text-align:center;font-size:12px;font-weight:300;color:var(--muted);letter-spacing:.06em}
    @media(max-width:700px){header{padding:0 16px}.cal-wrap{padding:20px 12px 48px}.cal-controls{padding:14px 16px}.wood-hero-inner{padding:44px 16px}.day-cell{min-height:60px}.event-row{grid-template-columns:56px 1fr}}
  </style>
</head>
<body>
<header>
  <a class="brand" href="https://www.broadoakstables.com" target="_blank">
    <div class="brand-icon"><img src="https://www.broadoakstables.com/favicon.ico" onerror="this.style.display='none';this.parentElement.textContent='🐴';" alt="BOS"/></div>
    Broad Oak Stables
  </a>
  <nav>
    <a href="https://www.broadoakstables.com" target="_blank">Broad Oak Stables</a>
    <a href="https://www.broadoakstables.com/radio" target="_blank">Radio</a>
    <span class="nav-sep">|</span>
    <a href="rules.html">Rules</a>
    <a href="calendar.html" class="active">Calendar</a>
    <a href="data.html">Data</a>
  </nav>
</header>
<div class="wood-hero"><div class="wood-hero-inner"><h1>Event Calendar</h1></div></div>
<div class="refresh-strip"><div class="refresh-fill" id="rfill"></div></div>
<div class="cal-controls">
  <div class="month-nav">
    <button id="prev">‹</button>
    <div class="month-label" id="mlabel">Loading…</div>
    <button id="next">›</button>
  </div>
  <div class="cal-meta">
    <div class="status-dot" id="dot"></div>
    <span id="updated">Fetching events…</span>
    <span id="countdown"></span>
  </div>
</div>
<div class="cal-wrap">
  <div class="cal-grid" id="cal-grid"></div>
  <div class="section-title" style="margin-top:40px">Upcoming Events</div>
  <div class="event-list" id="event-list"><div class="state-msg"><span class="spinner"></span>Loading events…</div></div>
</div>
<footer>Broad Oak Stables &nbsp;·&nbsp; Event Calendar</footer>
<script>
  /* ====================================================
     CONFIGURATION
     ====================================================
     Google Sheet columns needed:
       Date        | YYYY-MM-DD format  e.g. 2025-06-14
       Title       | event name
       Time        | e.g. 7:00 PM SLT   (optional)
       Description | short detail       (optional)

     To get the URL:
       File > Share > Publish to web > select tab > CSV > Publish > copy URL

     REFRESH_MS: 300000 = 5 min | 600000 = 10 min
  */
  const SHEET_URL  = 'YOUR_CALENDAR_SHEET_CSV_URL_HERE';
  const REFRESH_MS = 300000;
  /* ==================================================== */

  const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let events = [], nextAt = Date.now() + REFRESH_MS;
  const todayFull = new Date();
  const todayMid  = new Date(todayFull.getFullYear(), todayFull.getMonth(), todayFull.getDate());
  let vy = todayMid.getFullYear(), vm = todayMid.getMonth();

  fetchEvents();
  setInterval(() => { nextAt = Date.now() + REFRESH_MS; fetchEvents(); bar(); }, REFRESH_MS);
  tick(); setInterval(tick, 10000);
  bar();

  document.getElementById('prev').onclick = () => { if (--vm < 0) { vm = 11; vy--; } render(); };
  document.getElementById('next').onclick = () => { if (++vm > 11) { vm = 0; vy++; } render(); };

  async function fetchEvents() {
    dot('loading');
    const url = SHEET_URL + (SHEET_URL.includes('?') ? '&' : '?') + '_t=' + Date.now();
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      Papa.parse(await res.text(), {
        header: true, skipEmptyLines: true,
        complete(r) {
          events = r.data.map(e => ({ ...e, _d: pd(e.Date || e.date || '') })).filter(e => e._d);
          render();
          document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          dot('ok');
        },
        error(e) { dot('error'); listErr(e.message); }
      });
    } catch (e) { dot('error'); listErr(e.message); }
  }

  function pd(s) { if (!s) return null; const d = new Date(s + 'T00:00:00'); return isNaN(d) ? null : d; }

  function render() { renderGrid(); renderList(); }

  function renderGrid() {
    const g = document.getElementById('cal-grid');
    document.getElementById('mlabel').textContent = MONTHS[vm] + ' ' + vy;
    const fd = new Date(vy, vm, 1).getDay();
    const dim = new Date(vy, vm + 1, 0).getDate();
    const dip = new Date(vy, vm, 0).getDate();
    let h = DAYS.map(d => '<div class="day-header">' + d + '</div>').join('');
    for (let i = fd - 1; i >= 0; i--)
      h += '<div class="day-cell other-month"><div class="day-num">' + (dip - i) + '</div></div>';
    for (let d = 1; d <= dim; d++) {
      const isT = d === todayMid.getDate() && vm === todayMid.getMonth() && vy === todayMid.getFullYear();
      const ev = onDay(vy, vm, d), sh = ev.slice(0, 2), ex = ev.length - sh.length;
      h += '<div class="day-cell' + (isT ? ' today' : '') + '"><div class="day-num">' + d + '</div>' +
        sh.map(e => '<div class="event-pip">' + esc(e.Title || e.title || 'Event') + '</div>').join('') +
        (ex > 0 ? '<div class="more-label">+' + ex + ' more</div>' : '') + '</div>';
    }
    const tot = Math.ceil((fd + dim) / 7) * 7;
    for (let d = 1; d <= tot - fd - dim; d++)
      h += '<div class="day-cell other-month"><div class="day-num">' + d + '</div></div>';
    g.innerHTML = h;
  }

  function renderList() {
    const l = document.getElementById('event-list');
    const up = events.filter(e => e._d >= todayMid).sort((a, b) => a._d - b._d).slice(0, 10);
    if (!up.length) { l.innerHTML = '<div class="no-events">No upcoming events scheduled.</div>'; return; }
    l.innerHTML = up.map((e, i) => {
      const d = e._d, mo = MONTHS[d.getMonth()].slice(0, 3).toUpperCase(), dy = d.getDate();
      const title = esc(e.Title || e.title || 'Event');
      const desc  = esc(e.Description || e.description || '');
      const time  = esc(e.Time || e.time || '');
      return '<div class="event-row"><div class="event-date-block"><div class="event-month">' + mo +
        '</div><div class="event-day">' + dy + '</div></div><div><div class="event-name">' + title +
        '</div>' + (desc ? '<div class="event-desc">' + desc + '</div>' : '') + '</div>' +
        (time ? '<div class="event-time">' + time + '</div>' : '') + '</div>';
    }).join('');
  }

  function onDay(y, m, d) { return events.filter(e => e._d && e._d.getFullYear() === y && e._d.getMonth() === m && e._d.getDate() === d); }
  function listErr(msg) { document.getElementById('event-list').innerHTML = '<div class="state-msg" style="color:#c94a4a">⚠ Could not load: ' + esc(msg) + '</div>'; }
  function bar() { const b = document.getElementById('rfill'); b.style.transition = 'none'; b.style.transform = 'scaleX(1)'; requestAnimationFrame(() => { b.style.transition = 'transform ' + REFRESH_MS + 'ms linear'; b.style.transform = 'scaleX(0)'; }); }
  function tick() { const s = Math.max(0, Math.round((nextAt - Date.now()) / 1000)); document.getElementById('countdown').textContent = 'Refreshes in ' + Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }
  function dot(s) { document.getElementById('dot').className = 'status-dot' + (s === 'error' ? ' error' : ''); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
